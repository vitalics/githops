name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # graphui/build.rs runs pnpm to build the UI even during `cargo test`.
      # It must complete before any Rust compilation touches githops-graphui.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          node-version: 24

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: graphui/ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm --dir graphui/ui install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests (core)
        run: cargo test -p githops-core

      - name: Run tests (workspace)
        run: cargo test --workspace --exclude githops-graphui

  # ── Build ────────────────────────────────────────────────────────────────────
  # Verifies the full workspace compiles on all target platforms.
  # No artifacts are produced.
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          node-version: 24

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: graphui/ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm --dir graphui/ui install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --target ${{ matrix.target }}
