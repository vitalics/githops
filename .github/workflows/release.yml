name: Release

# Triggered by a version tag push OR manually by choosing a bump type.
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  # ── 1. Prepare ─────────────────────────────────────────────────────────────
  # Creates the git tag (manual runs only), resolves version, builds changelog.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version:   ${{ steps.meta.outputs.version }}
      tag:       ${{ steps.meta.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Read last tag, then bump the chosen component
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST="${LATEST#v}"
            IFS='.' read -r -a parts <<< "$LATEST"
            MAJOR="${parts[0]:-0}"
            MINOR="${parts[1]:-0}"
            PATCH="${parts[2]:-0}"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            # Normalize to major.minor.patch (Cargo requires all three components)
            IFS='.' read -r -a parts <<< "$VERSION"
            VERSION="${parts[0]:-0}.${parts[1]:-0}.${parts[2]:-0}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          RANGE="${PREV:+$PREV..}$TAG"
          COMMITS=$(git log "$RANGE" \
            --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
            2>/dev/null || true)
          {
            echo 'changelog<<GITHOPS_CHANGELOG_EOF'
            echo "$COMMITS"
            echo 'GITHOPS_CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

  # ── 2. Build ────────────────────────────────────────────────────────────────
  # Compiles the binary and creates archives + platform installers.
  build:
    needs: prepare
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      # ── Stamp version into all Cargo.toml files ──────────────────────────
      - name: Stamp version
        shell: python3 {0}
        run: |
          import re, pathlib
          version = "${{ needs.prepare.outputs.version }}"
          for p in ["Cargo.toml", "githops-core/Cargo.toml", "graphui/Cargo.toml"]:
              text = pathlib.Path(p).read_text()
              text = re.sub(r'^version = "[^"]*"', f'version = "{version}"', text, count=1, flags=re.M)
              pathlib.Path(p).write_text(text)
          # Keep path-dep version constraints in sync
          for p in ["Cargo.toml", "graphui/Cargo.toml"]:
              text = pathlib.Path(p).read_text()
              text = re.sub(r'(githops-core\s*=\s*\{[^}]*version\s*=\s*")[^"]*(")', rf'\g<1>{version}\g<2>', text)
              text = re.sub(r'(graphui\s*=\s*\{[^}]*version\s*=\s*")[^"]*(")', rf'\g<1>{version}\g<2>', text)
              pathlib.Path(p).write_text(text)

      # ── Node / pnpm ──────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: graphui/ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm --dir graphui/ui install --frozen-lockfile

      # For cross (Docker) builds, dist/ must exist before cargo runs.
      - name: Build UI (cross only)
        if: matrix.cross == true
        run: pnpm --dir graphui/ui run build

      # ── Rust toolchain ──────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      # ── Compile ─────────────────────────────────────────────────────────
      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # ── Archive (tar.gz / zip) ───────────────────────────────────────────
      - name: Create tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          BIN="target/${{ matrix.target }}/release/githops"
          tar czf "githops-${TAG}-${{ matrix.target }}.tar.gz" \
            -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Create zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\githops.exe" `
            -DestinationPath "githops-${tag}-${{ matrix.target }}.zip"

      # ── macOS PKG installer ──────────────────────────────────────────────
      - name: Create macOS PKG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          BIN="target/${{ matrix.target }}/release/githops"
          mkdir -p pkg-root/usr/local/bin
          cp "$BIN" pkg-root/usr/local/bin/githops
          pkgbuild \
            --root pkg-root \
            --identifier com.vitalics.githops \
            --version "$VERSION" \
            --install-location "/" \
            "githops-${TAG}-${{ matrix.target }}.pkg"

      # ── macOS DMG ────────────────────────────────────────────────────────
      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          BIN="target/${{ matrix.target }}/release/githops"
          mkdir dmg-staging
          cp "$BIN" dmg-staging/githops
          printf 'Run the .pkg installer for automatic PATH setup, or:\n  sudo cp githops /usr/local/bin/\n' \
            > dmg-staging/INSTALL.txt
          hdiutil create \
            -srcfolder dmg-staging \
            -volname "githops ${TAG}" \
            -format UDZO \
            -o "githops-${TAG}-${{ matrix.target }}.dmg"

      # ── Windows MSI installer ────────────────────────────────────────────
      - name: Install cargo-wix
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --locked

      - name: Create Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          $env:GITHOPS_BIN_PATH = [System.IO.Path]::GetFullPath("target\x86_64-pc-windows-msvc\release\githops.exe")
          cargo wix --package githops --target x86_64-pc-windows-msvc --profile release --no-build --nocapture
          $msi  = Get-ChildItem "target\wix\*.msi" | Select-Object -First 1
          Move-Item $msi.FullName "githops-${tag}-x86_64-pc-windows-msvc.msi"

      # ── Collect and upload all dist files ────────────────────────────────
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for f in githops-*.tar.gz githops-*.zip githops-*.pkg githops-*.dmg githops-*.msi; do
            [ -f "$f" ] && cp "$f" dist/ || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  # ── 3. Release ──────────────────────────────────────────────────────────────
  # Downloads all artifacts, generates the release body, publishes once.
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          sparse-checkout: scripts/release.py
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Generate release body
        env:
          CHANGELOG:       ${{ needs.prepare.outputs.changelog }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG:     ${{ needs.prepare.outputs.tag }}
          RELEASE_REPO:    ${{ github.repository }}
        run: python3 scripts/release.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ needs.prepare.outputs.tag }}
          name:      "githops ${{ needs.prepare.outputs.tag }}"
          body_path: release-body.md
          files:     dist/*

  # ── 4. Distribute ────────────────────────────────────────────────────────────
  # Publishes to crates.io, npm, and updates the Homebrew tap.
  # Requires secrets: CARGO_REGISTRY_TOKEN, NPM_TOKEN, HOMEBREW_TAP_TOKEN
  distribute:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      # ── Stamp version ──────────────────────────────────────────────────────
      - name: Stamp version
        shell: python3 {0}
        run: |
          import re, pathlib
          version = "${{ needs.prepare.outputs.version }}"
          for p in ["Cargo.toml", "githops-core/Cargo.toml", "graphui/Cargo.toml"]:
              text = pathlib.Path(p).read_text()
              text = re.sub(r'^version = "[^"]*"', f'version = "{version}"', text, count=1, flags=re.M)
              pathlib.Path(p).write_text(text)
          # Keep path-dep version constraints in sync
          for p in ["Cargo.toml", "graphui/Cargo.toml"]:
              text = pathlib.Path(p).read_text()
              text = re.sub(r'(githops-core\s*=\s*\{[^}]*version\s*=\s*")[^"]*(")', rf'\g<1>{version}\g<2>', text)
              text = re.sub(r'(graphui\s*=\s*\{[^}]*version\s*=\s*")[^"]*(")', rf'\g<1>{version}\g<2>', text)
              pathlib.Path(p).write_text(text)

      # ── Node / pnpm (needed to build graphui for cargo publish) ───────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: graphui/ui/pnpm-lock.yaml

      - name: Build UI
        run: pnpm --dir graphui/ui install --frozen-lockfile && pnpm --dir graphui/ui run build

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # ── crates.io ──────────────────────────────────────────────────────────
      - name: Publish githops-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p githops-core --allow-dirty

      - name: Wait for githops-core to be indexed
        run: sleep 30

      - name: Publish graphui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p graphui --allow-dirty

      - name: Wait for graphui to be indexed
        run: sleep 30

      - name: Publish githops
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p githops --allow-dirty

      # ── npm ────────────────────────────────────────────────────────────────
      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Stamp npm package version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd npm
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$VERSION"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public

